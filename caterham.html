<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caterham Seven</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #C8102E;
      --black: #0a0a0a;
      --white: #f5f0eb;
      --gray: #1a1a1a;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
    }
    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(200,16,46,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
    }

    /* Layout */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Background grain texture */
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Diagonal red accent */
    .accent-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--red);
      transform-origin: top;
      animation: slideDown 0.8s cubic-bezier(0.16,1,0.3,1) 0.6s both;
    }

    @keyframes slideDown {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    .accent-line-h {
      position: absolute;
      bottom: 80px;
      left: 4px;
      width: 0;
      height: 1px;
      background: var(--red);
      animation: slideRight 0.8s cubic-bezier(0.16,1,0.3,1) 1.2s both;
    }

    @keyframes slideRight {
      to { width: 120px; }
    }

    /* Image container */
    .img-wrap {
      position: relative;
      z-index: 2;
      width: 90vw;
      max-width: 1100px;
      animation: riseUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }

    @keyframes riseUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      max-height: 70vh;
      filter: contrast(1.05) saturate(0.9);
    }

    /* Vignette over image */
    .img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.3) 0%,
        transparent 30%,
        transparent 70%,
        rgba(10,10,10,0.6) 100%
      );
      pointer-events: none;
    }

    /* Top label */
    .label-top {
      position: absolute;
      top: 36px;
      left: 48px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeSlide 0.8s ease 1s both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 4vw, 52px);
      letter-spacing: 0.08em;
      color: var(--white);
      line-height: 1;
    }

    .brand span {
      color: var(--red);
    }

    .divider-v {
      width: 1px;
      height: 40px;
      background: rgba(245,240,235,0.25);
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(245,240,235,0.5);
      font-weight: 300;
    }

    /* Bottom info bar */
    .info-bar {
      position: absolute;
      bottom: 32px;
      left: 48px;
      right: 48px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      animation: fadeSlide 0.8s ease 1.3s both;
    }

    .model-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 120px);
      line-height: 0.85;
      color: var(--white);
      mix-blend-mode: difference;
      letter-spacing: -0.01em;
    }

    .model-name em {
      display: block;
      font-style: normal;
      color: var(--red);
      font-size: 0.45em;
      letter-spacing: 0.15em;
    }

    .specs {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .spec-item {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,240,235,0.4);
      font-weight: 300;
    }

    .spec-item strong {
      color: var(--white);
      font-weight: 400;
      margin-left: 8px;
    }

    /* Corner mark */
    .corner-mark {
      position: absolute;
      top: 36px;
      right: 48px;
      z-index: 10;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(245,240,235,0.2);
      text-transform: uppercase;
      writing-mode: vertical-rl;
      animation: fadeSlide 0.8s ease 1.5s both;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse-red 2s ease-in-out infinite;
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="scene">
  <div class="accent-line"></div>
  <div class="accent-line-h"></div>

  <div class="label-top">
    <div class="brand">CATHER<span>AM</span></div>
    <div class="divider-v"></div>
    <div class="subtitle">Since 1973<br>Lightweight Performance</div>
  </div>

  <div class="corner-mark"><span class="dot"></span>Pure Driving</div>

  <div class="img-wrap">
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Caterham_Seven_CSR_260_-_Flickr_-_exfordy.jpg/1280px-Caterham_Seven_CSR_260_-_Flickr_-_exfordy.jpg"
      alt="Caterham Seven"
    >
  </div>

  <div class="info-bar">
    <div class="model-name">
      <em>Seven</em>
      CSR 260
    </div>
    <div class="specs">
      <div class="spec-item">Puissance <strong>260 ch</strong></div>
      <div class="spec-item">Poids <strong>460 kg</strong></div>
      <div class="spec-item">0–100 <strong>3.7 s</strong></div>
    </div>
  </div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  }
  animRing();
</script>
</body>
</html>
